name: Validate Canon

on:
  push:
    paths:
      - 'docs/**'
      - '**.md'
  pull_request:
    paths:
      - 'docs/**'
      - '**.md'

# Responsabilidad única: frontmatter y calidad documental.
# Escaneo de secretos → gitleaks.yml (herramienta dedicada).

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Frontmatter
  # ─────────────────────────────────────────────
  frontmatter:
    name: "📝 Frontmatter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar frontmatter en docs/
        run: |
          python3 - <<'PY'
          import os, sys
          REQUIRED = ['title', 'tipo', 'creado', 'actualizado', 'status']
          errors = []
          for root, _, files in os.walk('docs'):
              for f in files:
                  if not f.endswith('.md'):
                      continue
                  path = os.path.join(root, f)
                  content = open(path, encoding='utf-8', errors='ignore').read()
                  if not content.startswith('---'):
                      errors.append(f'MISSING FRONTMATTER: {path}')
                      continue
                  for field in REQUIRED:
                      if f'{field}:' not in content.split('---')[1]:
                          errors.append(f'MISSING FIELD [{field}]: {path}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('Frontmatter OK')
          PY

  # ─────────────────────────────────────────────
  # JOB 2: Calidad de docs
  # ─────────────────────────────────────────────
  doc-quality:
    name: "🟡 Calidad docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No shebangs en markdown
        run: |
          if grep -rn '^#!' docs/ --include='*.md' 2>/dev/null; then
            echo 'ERROR: shebang encontrado en markdown'
            exit 1
          fi
          echo 'Sin shebangs'

      - name: No enlaces rotos internos obvios
        run: |
          python3 - <<'PY'
          import os, re, sys
          errors = []
          for root, _, files in os.walk('docs'):
              for f in files:
                  if not f.endswith('.md'):
                      continue
                  path = os.path.join(root, f)
                  content = open(path, encoding='utf-8', errors='ignore').read()
                  links = re.findall(r'\[.*?\]\(([^)]+\.md[^)]*)\)', content)
                  for link in links:
                      if link.startswith('http') or link.startswith('#'):
                          continue
                      target = os.path.normpath(os.path.join(root, link.split('#')[0]))
                      if not os.path.exists(target):
                          errors.append(f'ENLACE ROTO: {path} -> {link}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('Enlaces internos OK')
          PY

      - name: Archivos sin actualizar (borrador > 30 dias)
        run: |
          python3 - <<'PY'
          import os, re, sys
          from datetime import datetime, date
          warnings = []
          today = date.today()
          for root, _, files in os.walk('docs'):
              for f in files:
                  if not f.endswith('.md'):
                      continue
                  path = os.path.join(root, f)
                  content = open(path, encoding='utf-8', errors='ignore').read()
                  if 'status: borrador' not in content:
                      continue
                  m = re.search(r'actualizado:\s*(\d{4}-\d{2}-\d{2})', content)
                  if not m:
                      continue
                  updated = datetime.strptime(m.group(1), '%Y-%m-%d').date()
                  days = (today - updated).days
                  if days > 30:
                      warnings.append(f'BORRADOR VIEJO ({days} dias): {path}')
          if warnings:
              print('\n'.join(warnings))
          else:
              print('Sin borradores viejos')
          PY
