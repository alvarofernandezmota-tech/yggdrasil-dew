# ============================================================
# GitHub Actions: Validación automática de YMLs en cada push
# Avisa si hay errores de sintaxis antes de intentar levantar
# ============================================================
name: Validate YMLs

on:
  push:
    paths:
      - 'docker/**/*.yml'
      - 'docker/**/*.yaml'
  pull_request:
    paths:
      - 'docker/**/*.yml'

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate docker YMLs
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" docker/

      - name: Validate docker compose syntax
        run: |
          for f in docker/batcueva-*.yml; do
            echo "Validando: $f"
            docker compose -f "$f" config --quiet && echo "✅ OK: $f" || echo "❌ ERROR: $f"
          done
