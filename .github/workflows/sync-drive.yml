# Sync personal-v2 → Google Drive
# Se ejecuta cada noche a las 23:00 CEST
# Requiere secret: RCLONE_CONF (config rclone con remote 'gdrive' configurado)
# Estado: PENDIENTE CONFIGURAR — añadir RCLONE_CONF en GitHub Settings > Secrets

name: Sync to Google Drive

on:
  schedule:
    - cron: '0 21 * * *'  # 23:00 CEST = 21:00 UTC
  workflow_dispatch:       # permite ejecución manual desde GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONF }}

      - name: Sync to Google Drive
        run: |
          rclone sync . gdrive:personal-v2 \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --progress

      - name: Log sync
        run: echo "Sync completado $(date '+%Y-%m-%d %H:%M')" >> sync.log
