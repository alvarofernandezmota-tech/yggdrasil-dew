name: 🔬 Auditoría Semanal Yggdrasil

on:
  schedule:
    - cron: '0 7 * * MON'  # Lunes 07:00 UTC (09:00 CEST)
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de auditoría'
        required: false
        default: 'express'
        type: choice
        options:
          - express
          - completa

permissions:
  issues: write
  contents: read

jobs:
  auditoria-issues:
    name: FASE 1 — Auditoría Issues DEW
    runs-on: ubuntu-latest
    outputs:
      issues_abiertos: ${{ steps.count.outputs.total }}
      protocolos_ok: ${{ steps.protocolos.outputs.ok }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para git log

      - name: Verificar protocolos existen y tienen contenido
        id: protocolos
        run: |
          echo "## Verificación de protocolos" >> $GITHUB_STEP_SUMMARY
          PROTOCOLOS=(
            "docs/canon/protocolos/PROTOCOLO-INICIO-SESION.md"
            "docs/canon/protocolos/PROTOCOLO-CIERRE-SESION.md"
            "docs/canon/protocolos/PROTOCOLO-AUDITORIA-COMPLETA.md"
            "docs/canon/protocolos/PROTOCOLO-REVISION-SALUD.md"
            "docs/canon/protocolos/PROTOCOLO-NUEVO-REPO.md"
          )
          OK=true
          for P in "${PROTOCOLOS[@]}"; do
            if [ -f "$P" ]; then
              SIZE=$(wc -c < "$P")
              if [ "$SIZE" -lt 500 ]; then
                echo "⚠️ $P — muy corto ($SIZE bytes)" >> $GITHUB_STEP_SUMMARY
                OK=false
              else
                echo "✅ $P ($SIZE bytes)" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "❌ FALTA: $P" >> $GITHUB_STEP_SUMMARY
              OK=false
            fi
          done
          echo "ok=$OK" >> $GITHUB_OUTPUT

      - name: Contar issues abiertos
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(gh issue list --state open --limit 100 --json number | jq length)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "## Issues abiertos: $TOTAL" >> $GITHUB_STEP_SUMMARY

      - name: Issues sin label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Issues sin label" >> $GITHUB_STEP_SUMMARY
          SIN_LABEL=$(gh issue list --state open --limit 100 --json number,title,labels \
            | jq -r '.[] | select(.labels | length == 0) | "- #\(.number) \(.title)"')
          if [ -z "$SIN_LABEL" ]; then
            echo "_Todos tienen label ✅_" >> $GITHUB_STEP_SUMMARY
          else
            echo "$SIN_LABEL" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verificar ADRs
        run: |
          echo "## ADRs detectadas" >> $GITHUB_STEP_SUMMARY
          if [ -d "docs/adr" ]; then
            COUNT=$(find docs/adr -name "*.md" | wc -l)
            echo "Total ADRs: $COUNT" >> $GITHUB_STEP_SUMMARY
            find docs/adr -name "*.md" | sort | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Carpeta docs/adr no encontrada" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verificar archivos canon críticos
        run: |
          echo "## Archivos canon críticos" >> $GITHUB_STEP_SUMMARY
          CANON_FILES=(
            "ESTADO-SISTEMA.md"
            "MASTER-PENDIENTES.md"
            "docs/canon/OWNERSHIP-MATRIX.md"
          )
          for F in "${CANON_FILES[@]}"; do
            if [ -f "$F" ]; then
              # Obtener fecha del último commit de forma segura
              COMMIT_TS=$(git log -1 --format=%ct -- "$F" 2>/dev/null || echo "")
              if [ -n "$COMMIT_TS" ]; then
                DAYS=$(( ( $(date +%s) - COMMIT_TS ) / 86400 ))
                echo "✅ $F — modificado hace $DAYS días" >> $GITHUB_STEP_SUMMARY
              else
                echo "✅ $F — (sin historial git aún)" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "❌ FALTA: $F" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Abrir issue si hay protocolos rotos
        if: steps.protocolos.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date '+%Y-%m-%d')
          gh issue create \
            --title "[AUTO] Protocolos rotos detectados — $DATE" \
            --body "La auditoría automática detectó protocolos faltantes o vacíos. Ver: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug"

      - name: Resumen final
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Auditoría $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Issues abiertos: ${{ steps.count.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- Protocolos OK: ${{ steps.protocolos.outputs.ok }}" >> $GITHUB_STEP_SUMMARY
          echo "- Modo: ${{ inputs.modo || 'schedule' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Próxima ejecución: Lunes 09:00 CEST" >> $GITHUB_STEP_SUMMARY
