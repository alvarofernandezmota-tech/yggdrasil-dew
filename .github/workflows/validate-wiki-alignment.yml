name: Validate Wiki Alignment
# SCOPE: Solo lo que gitleaks.yml y validate-canon.yml NO hacen.
# - gitleaks.yml    → scan de secretos (NO duplicar aquí)
# - validate-canon.yml → verifica estructura canon Dew (NO duplicar aquí)
# - este workflow   → diario reciente + islas WIKI obligatorias

on:
  schedule:
    - cron: '0 8 * * *'   # Cada mañana 08:00 UTC (10:00 CEST)
  workflow_dispatch:

jobs:
  check-diario:
    runs-on: ubuntu-latest
    name: Diario reciente + Islas WIKI

    steps:
      - name: Checkout yggdrasil-dew
        uses: actions/checkout@v7

      - name: Verificar diario reciente
        run: |
          echo "=== Diario reciente ==="
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d)
          FOUND=0

          for pattern in "${TODAY}" "${TODAY}-noche" "${TODAY}-completo" \
                         "${YESTERDAY}" "${YESTERDAY}-noche" "${YESTERDAY}-completo"; do
            if [ -f "docs/diarios/${pattern}.md" ]; then
              echo "OK: Diario encontrado → docs/diarios/${pattern}.md"
              FOUND=1
              break
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "WARN: Sin diario en las últimas 48h (hoy: ${TODAY})"
            echo "Acción: crear docs/diarios/${TODAY}.md con plantilla de docs/canon/PLANTILLA-DIARIO.md"
          fi

      - name: Verificar islas obligatorias WIKI (cross-repo check)
        run: |
          echo "=== Islas WIKI obligatorias ==="
          # Descarga el INDEX de WIKI via API pública (repo privado = solo si el token tiene acceso)
          WIKI_INDEX=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/alvarofernandezmota-tech/WIKI---PERSONAL/contents/wiki/islas/INDEX.md" \
            | grep -c '"type":"file"' || true)

          if [ "$WIKI_INDEX" -gt 0 ]; then
            echo "OK: wiki/islas/INDEX.md existe en WIKI---PERSONAL"
          else
            echo "WARN: wiki/islas/INDEX.md no encontrado en WIKI---PERSONAL"
          fi

          echo "RESULTADO: Verificación cross-repo completada"

      - name: Summary
        if: always()
        run: |
          echo "=== RESUMEN $(date '+%Y-%m-%d %H:%M UTC') ==="
          echo "workflows activos: gitleaks | validate-canon | validate-wiki-alignment"
          echo "issues: https://github.com/alvarofernandezmota-tech/yggdrasil-dew/issues"
