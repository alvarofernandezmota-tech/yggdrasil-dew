# Dependabot — yggdrasil-dew
# Evaluado y activado en Fase 4 del Plan de Alineacion.
# PRs semanales los lunes para GitHub Actions. Revision manual obligatoria.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
