# ============================================================
# BATCUEVA MASTER ORCHESTRATOR
# Orquesta todos los stacks con un solo comando
#
# Uso completo:  docker compose -f docker/batcueva-master.yml up -d
# Solo OSINT:    docker compose -f docker/batcueva-osint.yml up -d
# Solo pentest:  docker compose -f docker/batcueva-pentest.yml up -d
#
# ADVERTENCIA: Levantar todo consume ~8-10GB RAM.
# En Madre (16GB) verificar RAM libre antes:
#   free -h
# ============================================================

include:
  - path: batcueva-osint.yml
  - path: batcueva-pentest.yml
  - path: batcueva-siem.yml
  - path: batcueva-vuln.yml

# Red compartida para comunicación inter-stack
networks:
  batcueva-net:
    driver: bridge
    name: batcueva-net
  vuln-net:
    driver: bridge
    name: vuln-net
    internal: true   # sin salida directa a internet — seguridad

volumes:
  shared-workspace:
    name: batcueva-workspace
