# ============================================================
# BATCUEVA VULN STACK
# Greenbone (OpenVAS) + Nuclei + OWASP ZAP
# Uso: docker compose -f docker/batcueva-vuln.yml up -d
# NOTA: Greenbone tarda 10-20 min en primer arranque (descarga NVTs)
# ============================================================
name: batcueva-vuln

networks:
  vuln-net:
    driver: bridge
    internal: false   # necesita internet para descargar feeds de Greenbone

volumes:
  gvm-data:
  gvm-certs:
  zap-data:
  nuclei-templates:

services:

  # ---- Greenbone Community Edition (OpenVAS) ----
  # Web UI: https://localhost:9392 | user: admin | pass: admin (cambiar)
  gvm:
    image: greenbone/community-edition:latest
    container_name: greenbone-gvm
    restart: unless-stopped
    ports:
      - "9392:9392"
    networks:
      - vuln-net
    volumes:
      - gvm-data:/var/lib/gvm
      - gvm-certs:/var/lib/gvm/CA
    environment:
      - GVMD_POSTGRESQL_URI=postgresql://gvm:gvm@localhost/gvmd
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9392"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 300s  # 5 min para primer arranque

  # ---- Nuclei (ProjectDiscovery) — escáner de plantillas ----
  # Uso: docker exec -it nuclei nuclei -u https://target.com -t ~/nuclei-templates/
  nuclei:
    image: projectdiscovery/nuclei:latest
    container_name: nuclei
    restart: "no"   # se usa bajo demanda, no como daemon
    stdin_open: true
    tty: true
    volumes:
      - nuclei-templates:/root/nuclei-templates
      - ./pentest/workspace:/workspace
    networks:
      - vuln-net
    entrypoint: ["/bin/sh"]
    command: ["-c", "nuclei -update-templates && tail -f /dev/null"]

  # ---- OWASP ZAP — proxy de intercepción para APIs/webs ----
  # Web UI: http://localhost:8082 | Proxy: localhost:8090
  zap:
    image: owasp/zap2docker-stable:latest
    container_name: zap-proxy
    restart: unless-stopped
    ports:
      - "8082:8080"   # Web UI (8082 para no colisionar con DefectDojo:8080)
      - "8090:8090"   # Proxy
    networks:
      - vuln-net
    volumes:
      - zap-data:/home/zap/.ZAP
    command: zap-webswing.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
