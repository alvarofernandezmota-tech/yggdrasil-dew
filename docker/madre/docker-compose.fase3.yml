  #     - headscale_config:/etc/headscale
  #     - headscale_data:/var/lib/headscale
  #   command: serve
  #   labels:
  #     - "madre.fase=3"
  #     - "madre.servicio=headscale-vpn-propio"

volumes:
  n8n_data:
  gitea_data:
  code_server_config:
  # headscale_config:
  # headscale_data:

networks:
  default:
    name: batcueva
    external: true

