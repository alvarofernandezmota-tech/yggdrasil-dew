# Fase 3 — Automatización + Dev remoto + Self-hosted infra
# Requiere: Fases 1 y 2 activas
# FUENTE ORIGINAL: ~/Obsidian/cerebro/tecnico/setup/servidor/batcueva-fase3.yml
# Ejecutar: docker compose -f docker-compose.fase3.yml up -d

services:

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://100.91.112.32:5678  # IP Tailscale madre
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}  # ⚠️ OBLIGATORIO en .env
      - TZ=Europe/Madrid
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "madre.fase=3"
      - "madre.servicio=n8n-automatizacion"

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: always
    ports:
      - "3003:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=100.91.112.32
      - GITEA__server__ROOT_URL=http://100.91.112.32:3003
      - TZ=Europe/Madrid
    volumes:
      - gitea_data:/data
    labels:
      - "madre.fase=3"
      - "madre.servicio=gitea-git-local"

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: always
    ports:
      - "8443:8443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - PASSWORD=${CODE_SERVER_PASSWORD}  # ⚠️ OBLIGATORIO en .env
      - SUDO_PASSWORD=${CODE_SERVER_SUDO}  # ⚠️ OBLIGATORIO en .env
      - DEFAULT_WORKSPACE=/config/workspace/cerebro
    volumes:
      - code_server_config:/config
      - ~/yggdrasil-dew:/config/workspace/cerebro
    labels:
      - "madre.fase=3"
      - "madre.servicio=vscode-browser"

  # 🔜 PENDIENTE — headscale no está corriendo aún
  # headscale:
  #   image: headscale/headscale:latest
  #   container_name: headscale
  #   restart: always
  #   ports:
  #     - "8085:8080"
