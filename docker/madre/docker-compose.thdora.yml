# ✅ ACTIVO — VALIDADO: 2026-07-01
# THDORA v0.17.0 — Stack: api + bot + Prometheus + Grafana
# FUENTE REAL: ~/Projects/thdora/docker-compose.yml en madre
#
# Accesos:
#   API:      http://localhost:8000
#   Métricas: http://localhost:9090
#   Grafana:  http://localhost:3000  (admin/admin ⚠️ cambiar)

services:

  # ── API FastAPI ──
  thdora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thdora
    restart: unless-stopped
    environment:
      SERVICE_TARGET: api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import urllib.request, sys
          try:
              r = urllib.request.urlopen('http://localhost:8000/health/live', timeout=5)
              sys.exit(0 if r.status == 200 else 1)
          except Exception as e:
              print(e); sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - thdora-net

  # ── Bot Telegram PTB ──
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thdora-bot
    restart: unless-stopped
    environment:
      SERVICE_TARGET: bot
      THDORA_API_URL: "http://thdora:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      thdora:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - thdora-net

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - thdora-net

  # ── Grafana ──
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin   # ⚠️ CAMBIAR — credencial por defecto
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      - prometheus
    networks:
      - thdora-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  thdora-net:
    driver: bridge
