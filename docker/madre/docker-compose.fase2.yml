# ✅ ACTIVO — VALIDADO: 2026-07-01
# Fase 2 — Monitoring + OSINT + Gestión
# Requiere: Fase 1 activa (Ollama + WebUI + Qdrant)
# FUENTE ORIGINAL: ~/Obsidian/cerebro/tecnico/setup/servidor/batcueva-fase2.yml
# Ejecutar: docker compose -f docker-compose.fase2.yml up -d

services:

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # ⚠️ docker.sock — auditar privilegios
      - portainer_data:/data
    labels:
      - "madre.fase=2"
      - "madre.servicio=portainer"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always
    ports:
      - "3002:3001"  # ✅ puerto real en producción es 3002
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      - "madre.fase=2"
      - "madre.servicio=uptime-kuma"

  spiderfoot:
    image: spiderfoot:latest  # imagen local compilada
    container_name: spiderfoot
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot_data:/home/spiderfoot/.spiderfoot
    labels:
      - "madre.fase=2"
      - "madre.servicio=spiderfoot-osint"

  heimdall:
    image: linuxserver/heimdall:latest
    container_name: heimdall
    restart: always
    ports:
      - "8090:80"
      - "8091:443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - heimdall_data:/config
    labels:
      - "madre.fase=2"
      - "madre.servicio=dashboard"

volumes:
  portainer_data:
  uptime_kuma_data:
  spiderfoot_data:
  heimdall_data:

networks:
  default:
    name: batcueva
    external: true

# ⚠️ PENDIENTE HARDENING:
#   - portainer: /var/run/docker.sock expuesto — riesgo container breakout
#   - todos los puertos en 0.0.0.0 — cambiar a 127.0.0.1
