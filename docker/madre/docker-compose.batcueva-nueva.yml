# 🔜 PENDIENTE — batcueva con GPU (preparado, no desplegado en madre)
# Uso futuro: cuando batcueva tenga GPU NVIDIA disponible
# FUENTE: ~/docker/batcueva-nueva/docker-compose.yml
# ⚠️ NO usar en madre — madre no tiene GPU

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3001:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama

volumes:
  ollama_data:
  open_webui_data:
