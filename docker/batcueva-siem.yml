# ============================================================
# BATCUEVA SIEM + MONITOREO DE RED
# Wazuh (SIEM) + Suricata (IDS) + DefectDojo (vuln mgmt)
# Uso: docker compose -f docker/batcueva-siem.yml up -d
# NOTA: Wazuh requiere mínimo 4GB RAM disponibles
# ============================================================
name: batcueva-siem

networks:
  siem-net:
    driver: bridge

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  wazuh-dashboard-data:
  defectdojo-data:
  defectdojo-db:

services:

  # ---- Wazuh Manager (SIEM core) ----
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: wazuh-manager
    restart: unless-stopped
    ports:
      - "1514:1514"   # agentes
      - "1515:1515"   # registro agentes
      - "514:514/udp" # syslog
      - "55000:55000" # API REST
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=WazuhBatcueva2026!
    volumes:
      - wazuh-manager-data:/var/ossec/data
    networks:
      - siem-net
    healthcheck:
      test: ["CMD", "/var/ossec/bin/wazuh-control", "status"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 120s

  # ---- Wazuh Indexer (OpenSearch) ----
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: wazuh-indexer
    restart: unless-stopped
    ports:
      - "9201:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    networks:
      - siem-net

  # ---- Wazuh Dashboard ----
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: wazuh-dashboard
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=WazuhBatcueva2026!
      - WAZUH_API_URL=https://wazuh-manager
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    volumes:
      - wazuh-dashboard-data:/usr/share/wazuh-dashboard/data
    networks:
      - siem-net

  # ---- Suricata IDS/IPS (monitoreo tráfico) ----
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    restart: unless-stopped
    network_mode: host   # necesario para captura real de tráfico
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - ./siem/suricata/rules:/etc/suricata/rules
      - ./siem/suricata/logs:/var/log/suricata
    command: -i eth0 --af-packet

  # ---- DefectDojo: Hub central de vulnerabilidades ----
  defectdojo:
    image: defectdojo/defectdojo-django:latest
    container_name: defectdojo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DD_DEBUG=False
      - DD_ALLOWED_HOSTS=*
      - DD_DATABASE_URL=postgresql://defectdojo:defectdojo@defectdojo-db/defectdojo
      - DD_SECRET_KEY=batcueva-defectdojo-secret-2026
      - DD_CREDENTIAL_AES_256_KEY=batcueva16charskey
    depends_on:
      - defectdojo-db
    volumes:
      - defectdojo-data:/app/media
    networks:
      - siem-net

  defectdojo-db:
    image: postgres:15-alpine
    container_name: defectdojo-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=defectdojo
      - POSTGRES_PASSWORD=defectdojo
      - POSTGRES_DB=defectdojo
    volumes:
      - defectdojo-db:/var/lib/postgresql/data
    networks:
      - siem-net
