# ============================================================
# BATCUEVA OSINT STACK
# SpiderFoot + IVRE + TheHive (desactivado por RAM)
# Uso: docker compose -f docker/batcueva-osint.yml up -d
# Para solo SpiderFoot: docker compose -f docker/batcueva-osint.yml up -d spiderfoot
# ============================================================
name: batcueva-osint

networks:
  osint-net:
    driver: bridge

volumes:
  spiderfoot-data:
  ivre-data:
  ivre-db:

services:

  # ---- SpiderFoot: OSINT por persona/dominio/IP/email ----
  # Web UI: http://100.91.112.32:5001
  spiderfoot:
    image: spiderfoot/spiderfoot:latest
    container_name: spiderfoot
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot-data:/home/spiderfoot/.spiderfoot
    networks:
      - osint-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- IVRE: Recon de red e inteligencia de infraestructura ----
  # Imagen corregida: ivre/base (imagen oficial correcta en Docker Hub)
  # Web UI: http://100.91.112.32:5002
  ivre-web:
    image: ivre/base:latest
    container_name: ivre-web
    restart: unless-stopped
    ports:
      - "5002:80"
    environment:
      - IVRE_CONF=/etc/ivre.conf
    volumes:
      - ivre-data:/var/lib/ivre
    depends_on:
      ivre-db:
        condition: service_healthy
    networks:
      - osint-net

  ivre-db:
    image: mongo:6
    container_name: ivre-db
    restart: unless-stopped
    volumes:
      - ivre-db:/data/db
    networks:
      - osint-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- TheHive: Gestión de casos ----
  # DESACTIVADO: consume 1-2GB RAM (JVM). Activar cuando Acer esté en el stack.
  # Para activar: descomentar y ejecutar con perfil --profile thehive
  # thehive:
  #   image: strangebee/thehive:latest
  #   container_name: thehive
  #   restart: unless-stopped
  #   ports:
  #     - "9000:9000"
  #   environment:
  #     - JVM_OPTS=-Xms512m -Xmx1g
  #   networks:
  #     - osint-net
  #   profiles: ["thehive"]
