# =============================================================================
# batcueva-fase3.yml — Automatización + Dev remoto + Self-hosted infra
# Ejecutar: docker compose -f batcueva-fase3.yml up -d
# Requiere: Fase 1+2 activas (red batcueva creada)
# Actualizado: 2026-06-25 — fix headscale puerto 9090→9091 (conflicto Prometheus)
# =============================================================================

services:

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://100.91.112.32:5678
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-batcueva32charskeyCAMBIAR}
      - TZ=Europe/Madrid
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "batcueva.fase=3"
      - "batcueva.servicio=n8n-automatizacion"

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: always
    ports:
      - "3003:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=100.91.112.32
      - GITEA__server__ROOT_URL=http://100.91.112.32:3003
      - TZ=Europe/Madrid
    volumes:
      - gitea_data:/data
    labels:
      - "batcueva.fase=3"
      - "batcueva.servicio=gitea-github-local"

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: always
    ports:
      - "8443:8443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - PASSWORD=${CODE_SERVER_PASSWORD:-cambiar_esto}
      - SUDO_PASSWORD=${CODE_SERVER_SUDO:-cambiar_esto}
      - DEFAULT_WORKSPACE=/config/workspace/cerebro
    volumes:
      - code_server_config:/config
      - /home/varopc/yggdrasil-dew:/config/workspace/cerebro
    labels:
      - "batcueva.fase=3"
      - "batcueva.servicio=vscode-browser"

  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: always
    ports:
      - "8085:8080"
      - "9091:9090"
    volumes:
      - headscale_config:/etc/headscale
      - headscale_data:/var/lib/headscale
    command: serve
    labels:
      - "batcueva.fase=3"
      - "batcueva.servicio=headscale-vpn-propio"

volumes:
  n8n_data:
  gitea_data:
  code_server_config:
  headscale_config:
  headscale_data:

networks:
  default:
    name: batcueva
    external: true

# =============================================================================
# NOTAS:
# - headscale: puerto metrics 9091 (9090 ocupado por Prometheus)
# - code-server monta /home/varopc/yggdrasil-dew (ruta absoluta, fix ~ en Docker)
# - N8N_ENCRYPTION_KEY: definir en ~/.env ANTES del primer up
# - Red batcueva: crear antes con `docker network create batcueva`
# =============================================================================
