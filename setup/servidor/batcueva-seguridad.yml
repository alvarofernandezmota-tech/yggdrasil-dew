# =============================================================================
# batcueva-seguridad.yml — Análisis de código + escaneo de imágenes + antivirus
# Ejecutar: docker compose -f batcueva-seguridad.yml up -d
# Requiere: Fases 1+2 activas, red batcueva creada
# Creado: 2026-06-25
# =============================================================================
#
# SERVICIOS:
#   trivy-server  :4954  — escaneo CVEs en imágenes Docker + repos
#   semgrep       —      — análisis estático código malicioso (run-once)
#   clamav        :3310  — antivirus clásico para archivos
#
# USO:
#   Trivy web UI:  http://100.91.112.32:4954
#   Semgrep:       docker compose -f batcueva-seguridad.yml run --rm semgrep
#   ClamAV scan:   docker exec clamav clamdscan /scan
# =============================================================================

services:

  # ── TRIVY — CVE scanner Docker images + repos + secrets ──
  trivy-server:
    image: aquasec/trivy:latest
    container_name: trivy-server
    restart: unless-stopped
    ports:
      - "4954:4954"
    command: server --listen 0.0.0.0:4954
    volumes:
      - trivy_cache:/root/.cache/trivy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
    labels:
      - "batcueva.fase=seguridad"
      - "batcueva.servicio=trivy-cve-scanner"

  # ── SEMGREP — análisis estático (run-once, no daemon) ──
  semgrep:
    image: returntocorp/semgrep:latest
    container_name: semgrep
    profiles: ["scan"]
    volumes:
      - /home/varopc/yggdrasil-dew:/src:ro
    command: semgrep scan --config=auto /src --json -o /src/osint/resultados/semgrep-latest.json
    labels:
      - "batcueva.fase=seguridad"
      - "batcueva.servicio=semgrep-sast"

  # ── CLAMAV — antivirus clásico archivos ──
  clamav:
    image: clamav/clamav:latest
    container_name: clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
      - /home/varopc:/scan/varopc:ro
      - /home/varopc/yggdrasil-dew:/scan/repo:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
    labels:
      - "batcueva.fase=seguridad"
      - "batcueva.servicio=clamav-antivirus"

volumes:
  trivy_cache:
  clamav_data:

networks:
  default:
    name: batcueva
    external: true

# =============================================================================
# COMANDOS ÚTILES:
#
# Escanear imagen Docker:
#   docker run --rm aquasec/trivy image ollama/ollama:latest
#
# Escanear repo completo buscando secretos:
#   docker run --rm aquasec/trivy fs /home/varopc/yggdrasil-dew
#
# Semgrep en el repo (detecta patrones maliciosos, SQLi, hardcoded secrets):
#   docker compose -f batcueva-seguridad.yml run --rm semgrep
#   Resultado en: osint/resultados/semgrep-latest.json
#
# ClamAV — escanear directorio:
#   docker exec clamav clamdscan /scan/repo --recursive
#
# Actualizar firmas ClamAV:
#   docker exec clamav freshclam
# =============================================================================
