---
# ============================================================
# Playbook: Bootstrap de nodo nuevo (Madre, Acer, cualquier Linux)
# Instala: Docker, Tailscale, configura firewall, clona yggdrasil-dew
#
# Uso:
#   ansible-playbook -i "IP," infra/ansible/bootstrap-nodo.yml \
#     -u varopc --ask-become-pass \
#     -e "github_user=alvarofernandezmota-tech"
#
# Prerrequisito: ansible instalado en máquina de control
#   pip install ansible
# ============================================================
- name: Bootstrap nodo Batcueva
  hosts: all
  become: true
  vars:
    github_user: alvarofernandezmota-tech
    repo_url: "git@github.com:{{ github_user }}/yggdrasil-dew.git"
    repo_dest: "/home/{{ ansible_user }}/yggdrasil-dew"
    docker_compose_version: "2.27.0"

  tasks:

    - name: Actualizar sistema (Arch Linux)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_os_family == "Archlinux"

    - name: Actualizar sistema (Debian/Ubuntu)
      apt:
        update_cache: true
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Instalar dependencias base
      package:
        name:
          - git
          - curl
          - wget
          - htop
          - zsh
          - openssh
        state: present

    - name: Instalar Docker
      package:
        name: docker
        state: present

    - name: Instalar docker-compose plugin
      package:
        name: docker-compose
        state: present
      ignore_errors: true

    - name: Habilitar y arrancar Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Añadir usuario al grupo docker
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Instalar Tailscale (script oficial)
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Habilitar Tailscale
      systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Configurar sysctl para Wazuh/ElasticSearch
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: true

    - name: Clonar yggdrasil-dew
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main
      become_user: "{{ ansible_user }}"
      ignore_errors: true

    - name: Copiar .env.template a .env si no existe
      copy:
        src: "{{ repo_dest }}/.env.template"
        dest: "{{ repo_dest }}/.env"
        remote_src: true
        force: false
      become_user: "{{ ansible_user }}"

    - name: Dar permisos a script bc
      file:
        path: "{{ repo_dest }}/scripts/bc"
        mode: '0755'

    - name: Añadir alias bc al .zshrc
      lineinfile:
        path: "/home/{{ ansible_user }}/.zshrc"
        line: "alias bc='{{ repo_dest }}/scripts/bc'"
        create: true
      become_user: "{{ ansible_user }}"

    - name: Mostrar instrucciones finales
      debug:
        msg:
          - "✅ Nodo configurado correctamente"
          - "👉 Ejecutar manualmente: sudo tailscale up"
          - "👉 Rellenar: {{ repo_dest }}/.env con credenciales reales"
          - "👉 Usar: source ~/.zshrc && bc sesion"
